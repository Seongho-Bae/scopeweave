apiVersion: apps/v1
kind: Deployment
metadata:
  name: scopeweave-deployment
  labels:
    app: scopeweave
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scopeweave
  template:
    metadata:
      labels:
        app: scopeweave
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: scopeweave
        image: scopeweave:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
