# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# A sample workflow which sets up periodic OSV-Scanner scanning for vulnerabilities,
# in addition to a PR check which avoids SKIPPED by using step-level gating.
#
# For more examples and options, including how to ignore specific vulnerabilities,
# see https://google.github.io/osv-scanner/github-action/

name: OSV-Scanner

'on':
  pull_request:
    branches: ["**"]
  merge_group:
    branches: ["**"]
  schedule:
    - cron: '20 19 * * 5'

permissions:
  # Require writing security events to upload SARIF file to security tab
  security-events: write
  # Read commit contents
  contents: read
  # Read PR metadata for comparison of introduced vulnerabilities
  pull-requests: read
  # Read workflow runs to check for duplicates
  actions: read

jobs:
  scan:
    runs-on: ubuntu-latest
    concurrency:
      # Avoid canceling this workflow due to other workflows' concurrency queues (e.g., CodeQL).
      # Key off PR number for PR/merge_group, otherwise ref.
      group: osv-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: false
    steps:
      - name: Evaluate mode and manifests
        id: guard
        uses: actions/github-script@450193c5abd4cdb17ba9f3ffcfe8f635c4bb6c2a  # v8
        with:
          script: |
            const event = context.eventName;
            const mode = (event === 'schedule') ? 'schedule' : (event === 'merge_group' ? 'merge_group' : 'pr');
            let run = true, reason = 'ok';

            // Fork guard for PR events
            if (event === 'pull_request') {
              const head = context.payload.pull_request?.head?.repo?.full_name || '';
              const current = `${context.repo.owner}/${context.repo.repo}`;
              if (head !== current) { run = false; reason = 'fork-pr'; }
            }

            core.setOutput('run', run ? 'true' : 'false');
            core.setOutput('mode', mode);
            core.setOutput('has', 'true');
            core.setOutput('reason', reason);

      - name: Checkout
        if: ${{ steps.guard.outputs.run == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Check for manifests
        if: ${{ steps.guard.outputs.run == 'true' }}
        id: check-manifests
        shell: bash
        run: |
          # Manifest existence check (Java/Maven or Node projects)
          has="false"
          if git ls-files | grep -E '(pom\.xml|package\.json|pnpm-lock\.yaml)' >/dev/null 2>&1; then
            has="true"
          fi
          echo "has=$has" >> "$GITHUB_OUTPUT"
          
      - name: Update guard based on manifest check
        if: ${{ steps.guard.outputs.run == 'true' }}
        id: final-guard
        uses: actions/github-script@450193c5abd4cdb17ba9f3ffcfe8f635c4bb6c2a  # v8
        with:
          script: |
            const has = '${{ steps.check-manifests.outputs.has }}' === 'true';
            let run = '${{ steps.guard.outputs.run }}' === 'true';
            let reason = '${{ steps.guard.outputs.reason }}';
            
            if (run && !has) {
              run = false;
              reason = 'no-manifests';
            }

            // Duplicate run guard (same workflow & branch already in_progress)
            if (run) {
              try {
                const event = context.eventName;
                let branch = '';
                if (event === 'pull_request' || event === 'merge_group') {
                  branch = context.payload.pull_request?.head?.ref || '';
                } else if (event === 'schedule') {
                  branch = context.ref.replace('refs/heads/','');
                }
                const MAX_RUNS_TO_SCAN = 200;
                let collected = [];
                const runs = await github.paginate(
                  github.rest.actions.listWorkflowRunsForRepo,
                  { owner: context.repo.owner, repo: context.repo.repo, status: 'in_progress', per_page: 100 },
                  (response, done) => {
                    const pageRuns = response?.data?.workflow_runs || [];
                    if (pageRuns.length > 0) {
                      collected = collected.concat(pageRuns);
                    }
                    if (collected.length >= MAX_RUNS_TO_SCAN) {
                      done();
                    }
                    return pageRuns;
                  }
                );
                const limitedRuns = Array.isArray(runs) ? runs.slice(0, MAX_RUNS_TO_SCAN) : collected.slice(0, MAX_RUNS_TO_SCAN);
                const same = limitedRuns.find(r => r.name === context.workflow && (!branch || r.head_branch === branch) && String(r.id) !== process.env.GITHUB_RUN_ID);
                if (same) { run = false; reason = 'run-in-progress'; }
              } catch (e) {
                core.warning('List runs failed: ' + e.message);
              }
            }

            core.setOutput('run', run ? 'true' : 'false');
            core.setOutput('mode', '${{ steps.guard.outputs.mode }}');
            core.setOutput('has', has ? 'true' : 'false');
            core.setOutput('reason', reason);

      - name: No-op (guard not met)
        if: ${{ steps.final-guard.outputs.run != 'true' }}
        run: |
          echo "No applicable manifests or guard prevented run (mode=${{ steps.final-guard.outputs.mode }}, has=${{ steps.final-guard.outputs.has }}, reason=${{ steps.final-guard.outputs.reason }})"
          exit 0

      # NOTE: Previously we temporarily renamed pnpm-lock.yaml to avoid older OSV scanner versions panicking on lockfileVersion 9.
      # We now use google/osv-scanner-action v2.3.1 (pinned by SHA) which includes the pnpm lockfile parsing fixes.
      #
      # Migration note:
      # - Upgraded to google/osv-scanner-action v2.3.1 (pinned by SHA).
      # - v2.x breaking change: HEAD scan removed by default (use --include-git-root if needed).
      #
      # Pinning note:
      # - This repository generally recommends pinning 3rd-party actions by SHA for supply-chain safety.
      - name: OSV scan
        if: ${{ steps.final-guard.outputs.run == 'true' }}
        # NOTE: Pin to a *valid* upstream ref. Previous pinned SHA no longer exists upstream,
        # causing github-action resolution to fail and leaving the job in a broken state.
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        continue-on-error: true
        with:
          # NOTE: Do NOT add YAML comments inside scan-args. The action receives the raw string and can
          # interpret `#` as a filesystem path (e.g., "Scanning dir #"), causing failures.
          scan-args: |
            --format sarif
            --output osv-results.sarif
            -r
            ./

      - name: Validate OSV SARIF output
        if: ${{ always() && steps.final-guard.outputs.run == 'true' }}
        id: validate-sarif
        shell: bash
        run: |
          set +e  # Continue on error
          
          SARIF_FILE="osv-results.sarif"
          VALID="false"
          
          echo "Checking for SARIF file..."
          
          if [ ! -f "$SARIF_FILE" ]; then
            echo "❌ SARIF file not found: $SARIF_FILE"
            echo "OSV scanner may not have produced any output."
          else
            FILE_SIZE=$(wc -c < "$SARIF_FILE" 2>/dev/null || echo "0")
            echo "✅ SARIF file found: $SARIF_FILE (${FILE_SIZE} bytes)"
            
            if [ "$FILE_SIZE" -eq 0 ]; then
              echo "❌ SARIF file is empty (0 bytes)"
              echo "OSV scan produced no output."
            else
              echo "Validating SARIF file format..."
              if jq empty "$SARIF_FILE" 2>/dev/null; then
                echo "✅ SARIF file is valid JSON"
                
                VERSION=$(jq -r '.version // empty' "$SARIF_FILE" 2>/dev/null)
                VERSION_JQ_STATUS=$?
                if [ "$VERSION_JQ_STATUS" -ne 0 ]; then
                  echo "❌ Failed to extract SARIF version using jq (exit code: $VERSION_JQ_STATUS)"
                  VERSION=""
                fi
                # Verify .runs is an array before getting length
                RUNS=$(jq 'if .runs | type == "array" then .runs | length else 0 end' "$SARIF_FILE" 2>/dev/null)
                RUNS=${RUNS:-0}
                echo "   SARIF version: ${VERSION:-unknown}"
                echo "   Number of runs: $RUNS"
                
                 if [ "$VERSION" = "2.1.0" ] && [ "$RUNS" -eq 1 ]; then
                   VALID="true"
                   echo "✅ SARIF file is valid (runs must be exactly 1) and ready for upload"
                else
                  echo "⚠️  SARIF file validation issues:"
                  if [ "$VERSION" != "2.1.0" ]; then
                    if [ "$VERSION_JQ_STATUS" -ne 0 ]; then
                      echo "   - Failed to extract version field (jq error)"
                    elif [ -z "$VERSION" ]; then
                      echo "   - Version field is missing or null"
                    else
                      echo "   - Version must be 2.1.0 (found: $VERSION)"
                    fi
                  fi
                  if [ "$RUNS" -ne 1 ]; then
                    echo "   - Runs must be exactly 1 (found: $RUNS)"
                  fi
                fi
              else
                echo "❌ SARIF file contains invalid JSON"
              fi
            fi
          fi
          
          if [ "$VALID" = "true" ]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi
          
          exit 0

      - name: Upload OSV SARIF to GitHub Security tab
        if: ${{ always() && steps.final-guard.outputs.run == 'true' && steps.validate-sarif.outputs.valid == 'true' }}
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: osv-results.sarif