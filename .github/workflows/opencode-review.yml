                  "-y",
                  "@guhcostan/web-search-mcp@1.0.5"
                ],
                "enabled": true,
                "timeout": 10000,
                "environment": {
                  "NPM_CONFIG_IGNORE_SCRIPTS": "true",
                  "NPM_CONFIG_LOGLEVEL": "error"
                }
              }
            },
            "permission": {
              "edit": "deny",
              "bash": "deny",
              "read": "allow",
              "grep": "allow",
              "glob": "allow",
              "list": "allow",
