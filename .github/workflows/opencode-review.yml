                  "bash": "deny",
                  "read": "allow",
                  "grep": "allow",
                  "glob": "allow",
                  "list": "allow",
                  "task": "deny",
                  "webfetch": "deny",
                  "websearch": "deny",
                  "lsp": "deny",
                  "external_directory": "allow"
